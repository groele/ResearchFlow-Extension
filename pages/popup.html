<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResearchFlow Quick Panel</title>
  <link rel="stylesheet" href="../styles/theme.css">
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body class="glass-panel">
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo-area">
        <div class="logo-orb gradient-bg-purple"></div>
        <div>
          <h2>ResearchFlow</h2>
          <p class="subtitle">Personal Research OS</p>
        </div>
      </div>
      <button id="btn-options" class="btn-secondary btn-icon" title="Open Master Dashboard">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </header>

    <!-- Metrics Grid -->
    <section class="metrics-grid">
      <div class="metric-card glass-card">
        <span class="metric-num gradient-text-purple" id="metric-projects">0</span>
        <span class="metric-label">Active Projects</span>
      </div>
      <div class="metric-card glass-card">
        <span class="metric-num gradient-text-emerald" id="metric-records">0</span>
        <span class="metric-label">Research Records</span>
      </div>
    </section>

    <!-- Action Shortcuts -->
    <section class="shortcuts" style="display:flex; flex-direction:column; gap:8px;">
      <button id="btn-open-master" class="btn-primary w-full gradient-bg-purple" style="font-weight: 700; display:flex; align-items:center; justify-content:center; gap:8px;">
        <svg class="svg-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        🚀 Enter Master Dashboard
      </button>
      <button id="btn-sidepanel" class="btn-secondary w-full" style="font-weight: 600; display:flex; align-items:center; justify-content:center; gap:8px;">
        <svg class="svg-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Toggle Sidepanel Workspace
      </button>
    </section>

    <!-- Quick Note Capture -->
    <section class="quick-capture glass-card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 2px;">
        <h3>⚡ Research Intake Panel</h3>
        <span class="badge badge-purple" style="font-size: 8px;">PaperPilot Intake</span>
      </div>
      
      <!-- Glowing Metadata Detected Banner -->
      <div class="paper-detected-banner" id="paper-detected-banner">
        <span class="pulse-dot"></span>
        <span id="detected-status-text">📄 Literature Metadata Detected</span>
      </div>

      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2px;">
          <label for="project-select" style="font-weight: 700; color: hsl(var(--text-primary));">Target Project</label>
          <button id="btn-toggle-project-creator" style="background:none; border:none; color:hsl(var(--accent-purple)); cursor:pointer; font-size:10px; font-weight:700; display:flex; align-items:center; gap:2px; padding: 0;" title="Create new project inline">➕ New Project</button>
        </div>
        <div style="display:flex; gap:6px;">
          <select id="project-select" style="flex:1; width: 100%;">
            <option value="">-- Uncategorized / Personal Notes --</option>
          </select>
          <input type="text" id="new-project-input" placeholder="New project name..." style="display:none; flex:1; width: 100%;">
        </div>
      </div>

      <div class="form-group">
        <label for="note-title" style="font-weight: 700; color: hsl(var(--text-primary));">Title / Paper Title</label>
        <input type="text" id="note-title" placeholder="e.g. Discussed cell morphology result">
      </div>

      <div class="form-group" id="group-doi">
        <label for="note-doi" style="font-weight: 700; color: hsl(var(--text-primary));">DOI / Literature URL</label>
        <input type="text" id="note-doi" placeholder="e.g. 10.1038/s41565-024-01567-2">
      </div>

      <div class="form-group">
        <label for="note-content" style="font-weight: 700; color: hsl(var(--text-primary));">Summary / Notes / Findings</label>
        <textarea id="note-content" placeholder="Enter quick observation, thoughts, or abstract highlights..."></textarea>
      </div>

      <button id="btn-save-note" class="btn-primary w-full gradient-bg-purple">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Captured Note
      </button>
    </section>
  </div>

  <script src="../scripts/storage.js"></script>
  <script src="../scripts/popup.js"></script>
</body>
</html>
